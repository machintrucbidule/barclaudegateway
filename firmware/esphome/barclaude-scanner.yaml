# =============================================================================
# BarclaudeGateway scanner — ESP32-C6 + GM861S (UART)
#
# Reads a barcode from the GM861S over UART, POSTs it to the BarclaudeGateway
# middleware (POST /api/v1/scan { "ean": "..." }, key-guarded — DECISION-028),
# waits for the synchronous ScanResponse, and drives an EXTERNAL WS2812 LED with
# a colour per ScanResponse.status. Feedback is LED-only (no buzzer — DECISION-020).
# Contract: docs/esphome-contract.md (the middleware always returns a JSON
# ScanResponse body, even on HTTP 400/502, so we switch on `status`).
#
# The scan and the keyword-search both hit the local "Layer B" API under
# /api/v1/* and must send the `X-API-Key` header (the `local_api_key`
# substitution below). Copy that key from the web UI: Config page -> "API locale".
#
# Home-Assistant integration: a manual-EAN text + a resend button push an EAN
# through the SAME pipeline as a physical scan; a "Search" text runs a keyword
# lookup; last EAN / last status / last product / last price / search result are
# exposed as sensors; the GM861S tuning is exposed as config numbers.
#
# ESP32-C6 requires the esp-idf framework in ESPHome (Arduino does not support
# the C6). Needs a recent ESPHome (esp-idf >= 5.1).
#
# Secrets: create a `secrets.yaml` next to this file with: wifi_ssid,
# wifi_password, ap_password, ota_password, api_encryption_key. The local API
# key is a plain substitution below (it is shared with the gateway, not a wifi
# secret) — paste it from the Config page.
#
# ---------------------------------------------------------------------------
# Wiring (all pins are configurable in the `substitutions:` block below):
#   GM861S  TX  -> ESP RX  (gm861_rx_pin, default GPIO5)
#   GM861S  RX  -> ESP TX  (gm861_tx_pin, default GPIO4)    # optional, config only
#   GM861S  VCC -> 3V3     GND -> GND        # GM861S is 3.3 V TTL — do NOT use 5 V logic
#   WS2812  DIN -> led_pin (default GPIO20)   VCC/GND as per the module
# =============================================================================

substitutions:
  device_name: barclaudescanner
  friendly_name: 'Barclaude Scanner'

  # --- BarclaudeGateway middleware (host + port) ---
  server_host: '192.168.1.37'
  server_port: '8791'

  # --- Local API (Layer B) ---
  # The middleware's auto-generated X-API-Key. Copy it from the web UI: Config page -> "API locale"
  # (or from the container/boot logs: "[BarclaudeGateway] Local API key generated. X-API-Key: ...").
  # It guards EVERY /api/v1/* call, including the scan (DECISION-028). Regenerating it in the UI means
  # you must paste the new value here and re-flash.
  local_api_key: 'paste-the-key-from-the-config-page'

  # --- GM861S UART ---
  gm861_rx_pin: 'GPIO5' # ESP RX  <- scanner TX
  gm861_tx_pin: 'GPIO4' # ESP TX  -> scanner RX (needed to configure the scanner)
  gm861_baud: '9600'

  # --- Feedback hardware ---
  led_pin: 'GPIO20' # WS2812 data-in

  # --- Timing ---
  http_timeout: '8s'
  feedback_ms: '1500ms' # how long the LED holds the result colour
  white_flush_ms: '100ms' # let the light loop push WHITE to the LED before the blocking POST

  # ---------------------------------------------------------------------------
  # GM861S scanner config
  # Applied at boot over UART, re-pushed on any number change or via the
  # "Apply scanner config" button. NOT saved to the scanner's flash (by design):
  # the scanner boots at factory defaults every time and this config is the only
  # source of truth. CRC is skipped (0xAB 0xCD) on every write frame.
  # ---------------------------------------------------------------------------
  #
  # reg 0x0000 = read mode + buzzer + both LEDs + illumination, one composed byte.
  # 0xD7 = induction(11) + illumination standard(01) + buzzer on(1) + green LED on(1)
  #   bit 7    green success LED   1 = on        0 = off
  #   bit 6    buzzer              1 = on        0 = mute
  #   bit 5-4  illumination (white)  00 = off  01 = on-at-read  10/11 = always-on
  #   bit 3-2  illumination 2nd field (keep equal to bit5-4; factory example does 01)
  #   bit 1-0  read mode           00 = manual  01 = cmd-trigger  10 = continuous  11 = induction
  # Examples: continuous = 0xD6 | always-on light = 0xFB (11/11) | buzzer off = 0x97
  gm861_reg0000: '0xD7'

  # Induction tuning defaults. Also exposed as HA numbers (restore_value: true,
  # so HA edits persist in NVS and win over these on the next boot).
  default_sensitivity: '50' # reg 0x000F, 0-255, HIGHER = LESS sensitive (factory 50)
  default_same_barcode_delay_s: '3.0' # reg 0x0013, 0 = re-scan same EAN immediately, >0 = block for N s (max 12.7)
  default_single_read_time_s: '5.0' # reg 0x0006, 0.1-25.5 s, time it tries before giving up
  default_break_time_s: '1.0' # reg 0x0005, 0-25.5 s, pause before monitoring again
  default_image_stab_s: '0.0' # reg 0x0004, 0-25.5 s, settle time after scene change before reading

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - delay: 1s # GM861S startup is <=250 ms; wait + let UART settle before pushing config
      - script.execute: apply_scanner_config

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:
  task_log_buffer_size: 2048

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: 'Barclaudescanner'
    password: !secret ap_password

captive_portal:

http_request:
  useragent: barclaude-scanner
  timeout: ${http_timeout}
  verify_ssl: false

uart:
  id: gm861_uart
  rx_pin: ${gm861_rx_pin}
  tx_pin: ${gm861_tx_pin}
  baud_rate: ${gm861_baud}

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: '${friendly_name} LED'
    pin: ${led_pin}
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF

text:
  - platform: template
    name: '${friendly_name} Manual EAN'
    id: manual_ean
    icon: mdi:barcode-scan
    optimistic: true
    mode: text
    min_length: 0
    max_length: 14
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !x.empty();'
            then:
              - script.execute:
                  id: send_scan
                  ean: !lambda 'return x;'

  # BL-013: keyword search over the local API (GET /api/v1/search?q=). Type a keyword in HA; the first
  # result (name + price) lands in the "Search result" sensor. Uses the X-API-Key like every /api/v1 call.
  - platform: template
    name: '${friendly_name} Search'
    id: search_query
    icon: mdi:magnify
    optimistic: true
    mode: text
    min_length: 0
    max_length: 64
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !x.empty();'
            then:
              - http_request.get:
                  url: !lambda |-
                    std::string enc;
                    for (char c : x) { if (c == ' ') enc += "%20"; else enc += c; }
                    return std::string("http://${server_host}:${server_port}/api/v1/search?q=") + enc;
                  capture_response: true
                  request_headers:
                    X-API-Key: '${local_api_key}'
                  on_response:
                    then:
                      - lambda: |-
                          std::string out = "aucun résultat";
                          json::parse_json(body, [&](JsonObject root) -> bool {
                            JsonArray products = root["products"];
                            if (!products.isNull() && products.size() > 0) {
                              std::string name = products[0]["name"] | "";
                              float price = products[0]["price"]["default"] | -1.0f;
                              char buf[160];
                              if (price >= 0.0f) snprintf(buf, sizeof(buf), "%s — %.2f €", name.c_str(), price);
                              else snprintf(buf, sizeof(buf), "%s", name.c_str());
                              out = buf;
                            }
                            return true;
                          });
                          id(search_result).publish_state(out);

number:
  - platform: template
    name: '${friendly_name} Sensitivity'
    id: num_sensitivity
    icon: mdi:tune
    entity_category: config
    mode: box
    min_value: 0
    max_value: 255
    step: 1
    restore_value: true
    initial_value: ${default_sensitivity}
    optimistic: true
    on_value:
      then:
        - script.execute: apply_scanner_config

  - platform: template
    name: '${friendly_name} Same-barcode delay'
    id: num_same_barcode_delay
    icon: mdi:timer-sand
    entity_category: config
    unit_of_measurement: s
    mode: box
    min_value: 0
    max_value: 12.7
    step: 0.1
    restore_value: true
    initial_value: ${default_same_barcode_delay_s}
    optimistic: true
    on_value:
      then:
        - script.execute: apply_scanner_config

  - platform: template
    name: '${friendly_name} Single read time'
    id: num_single_read_time
    icon: mdi:timer
    entity_category: config
    unit_of_measurement: s
    mode: box
    min_value: 0.1
    max_value: 25.5
    step: 0.1
    restore_value: true
    initial_value: ${default_single_read_time_s}
    optimistic: true
    on_value:
      then:
        - script.execute: apply_scanner_config

  - platform: template
    name: '${friendly_name} Break time'
    id: num_break_time
    icon: mdi:timer-pause
    entity_category: config
    unit_of_measurement: s
    mode: box
    min_value: 0
    max_value: 25.5
    step: 0.1
    restore_value: true
    initial_value: ${default_break_time_s}
    optimistic: true
    on_value:
      then:
        - script.execute: apply_scanner_config

  - platform: template
    name: '${friendly_name} Image stabilization'
    id: num_image_stab
    icon: mdi:image-filter-center-focus
    entity_category: config
    unit_of_measurement: s
    mode: box
    min_value: 0
    max_value: 25.5
    step: 0.1
    restore_value: true
    initial_value: ${default_image_stab_s}
    optimistic: true
    on_value:
      then:
        - script.execute: apply_scanner_config

button:
  - platform: template
    name: '${friendly_name} Resend EAN'
    id: resend_ean
    icon: mdi:reload
    on_press:
      then:
        - if:
            condition:
              lambda: 'return !id(manual_ean).state.empty();'
            then:
              - script.execute:
                  id: send_scan
                  ean: !lambda 'return id(manual_ean).state;'

  - platform: template
    name: '${friendly_name} Apply scanner config'
    id: apply_config_btn
    icon: mdi:cog-sync
    entity_category: config
    on_press:
      then:
        - script.execute: apply_scanner_config

text_sensor:
  - platform: template
    name: '${friendly_name} Last EAN'
    id: last_ean
    icon: mdi:barcode
  - platform: template
    name: '${friendly_name} Last status'
    id: last_status
    icon: mdi:list-status
  # BL-013: product info echoed in the scan response (ScanResponse.product) — no extra call.
  - platform: template
    name: '${friendly_name} Last product'
    id: last_product
    icon: mdi:tag-text
  - platform: template
    name: '${friendly_name} Last price'
    id: last_price
    icon: mdi:currency-eur
  - platform: template
    name: '${friendly_name} Search result'
    id: search_result
    icon: mdi:magnify-scan

globals:
  - id: scan_buf
    type: std::string
    restore_value: no
  - id: gm861_configuring
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: awaiting_response
    type: bool
    restore_value: no
    initial_value: 'false'

interval:
  - interval: 50ms
    then:
      - lambda: |-
          if (id(gm861_configuring)) {
            uint8_t junk;
            while (id(gm861_uart).available()) { id(gm861_uart).read_byte(&junk); }
            id(scan_buf).clear();
            return;
          }
          while (id(gm861_uart).available()) {
            uint8_t c;
            if (!id(gm861_uart).read_byte(&c)) break;
            if (c == '\r' || c == '\n') {
              if (!id(scan_buf).empty()) {
                std::string ean = id(scan_buf);
                id(scan_buf).clear();
                ESP_LOGD("scan", "barcode read from UART: %s", ean.c_str());
                id(send_scan)->execute(ean);
              }
            } else if (c >= 0x20 && c < 0x7f) {
              id(scan_buf).push_back((char) c);
              if (id(scan_buf).size() > 32) id(scan_buf).clear();
            }
          }

script:
  - id: apply_scanner_config
    mode: restart
    then:
      - lambda: 'id(gm861_configuring) = true;'
      - delay: 20ms
      - lambda: |-
          uint8_t f[9] = {0x7E, 0x00, 0x08, 0x01, 0x00, 0x00, ${gm861_reg0000}, 0xAB, 0xCD};
          id(gm861_uart).write_array(f, 9);
      - delay: 40ms
      - uart.write:
          id: gm861_uart
          data: [0x7E, 0x00, 0x08, 0x01, 0x00, 0x60, 0x01, 0xAB, 0xCD]
      - delay: 40ms
      - uart.write:
          id: gm861_uart
          data: [0x7E, 0x00, 0x08, 0x01, 0x00, 0x3F, 0x00, 0xAB, 0xCD]
      - delay: 40ms
      - uart.write:
          id: gm861_uart
          data: [0x7E, 0x00, 0x08, 0x02, 0x00, 0x54, 0x00, 0x00, 0xAB, 0xCD]
      - delay: 40ms
      - lambda: |-
          int v = (int) id(num_sensitivity).state;
          if (v < 0) v = 0; if (v > 255) v = 255;
          uint8_t f[9] = {0x7E,0x00,0x08,0x01,0x00,0x0F,(uint8_t)v,0xAB,0xCD};
          id(gm861_uart).write_array(f, 9);
      - delay: 40ms
      - lambda: |-
          float s = id(num_same_barcode_delay).state;
          uint8_t d;
          if (s <= 0.0f) d = 0x00;
          else { int u = (int)(s*10.0f+0.5f); if (u > 0x7F) u = 0x7F; d = 0x80 | (uint8_t)u; }
          uint8_t f[9] = {0x7E,0x00,0x08,0x01,0x00,0x13,d,0xAB,0xCD};
          id(gm861_uart).write_array(f, 9);
      - delay: 40ms
      - lambda: |-
          int u = (int)(id(num_single_read_time).state*10.0f+0.5f);
          if (u < 1) u = 1; if (u > 255) u = 255;
          uint8_t f[9] = {0x7E,0x00,0x08,0x01,0x00,0x06,(uint8_t)u,0xAB,0xCD};
          id(gm861_uart).write_array(f, 9);
      - delay: 40ms
      - lambda: |-
          int u = (int)(id(num_break_time).state*10.0f+0.5f);
          if (u < 0) u = 0; if (u > 255) u = 255;
          uint8_t f[9] = {0x7E,0x00,0x08,0x01,0x00,0x05,(uint8_t)u,0xAB,0xCD};
          id(gm861_uart).write_array(f, 9);
      - delay: 40ms
      - lambda: |-
          int u = (int)(id(num_image_stab).state*10.0f+0.5f);
          if (u < 0) u = 0; if (u > 255) u = 255;
          uint8_t f[9] = {0x7E,0x00,0x08,0x01,0x00,0x04,(uint8_t)u,0xAB,0xCD};
          id(gm861_uart).write_array(f, 9);
      - delay: 60ms
      - lambda: |-
          uint8_t junk;
          while (id(gm861_uart).available()) { id(gm861_uart).read_byte(&junk); }
          id(scan_buf).clear();
          id(gm861_configuring) = false;

  - id: set_led
    mode: restart
    parameters:
      r: int
      g: int
      b: int
    then:
      - light.turn_on:
          id: status_led
          red: !lambda 'return r / 255.0f;'
          green: !lambda 'return g / 255.0f;'
          blue: !lambda 'return b / 255.0f;'
          brightness: 50%
      - delay: ${feedback_ms}
      - light.turn_off: status_led

  - id: send_scan
    mode: restart
    parameters:
      ean: string
    then:
      - lambda: 'ESP_LOGD("scan", "send_scan START ean=%s", ean.c_str());'
      # WHITE in-flight, then a flush delay long enough for the light loop to push
      # it to the LED BEFORE the blocking POST freezes the loop. (10 ms was shorter
      # than one loop cycle, so the LED never updated.)
      - script.stop: set_led
      - light.turn_on:
          id: status_led
          red: 100%
          green: 100%
          blue: 100%
          brightness: 50%
      - lambda: 'ESP_LOGD("scan", "LED -> white (in-flight) ean=%s", ean.c_str());'
      - delay: ${white_flush_ms}
      - lambda: 'id(awaiting_response) = true;'
      # BL-013/DECISION-028: the scan is now a key-guarded local-API endpoint (POST /api/v1/scan), like
      # every other /api/v1 call. Same ScanResponse shape, so the LED mapping below is unchanged.
      - http_request.post:
          url: 'http://${server_host}:${server_port}/api/v1/scan'
          capture_response: true
          request_headers:
            Content-Type: application/json
            X-API-Key: '${local_api_key}'
          json: |-
            root["ean"] = ean;
          on_response:
            then:
              - lambda: |-
                  id(awaiting_response) = false;
                  std::string status = "error";
                  std::string pname = "";
                  float pprice = -1.0f;
                  json::parse_json(body, [&](JsonObject root) -> bool {
                    status = root["status"] | "error";
                    JsonObject prod = root["product"];
                    if (!prod.isNull()) {
                      std::string brand = prod["brand"] | "";
                      std::string label = prod["label"] | "";
                      pname = brand.empty() ? label : (brand + " " + label);
                      pprice = prod["price"] | -1.0f;
                    }
                    return true;
                  });
                  ESP_LOGI("scan", "RESULT ean=%s status=%s http=%d", ean.c_str(), status.c_str(), response->status_code);
                  id(last_ean).publish_state(ean);
                  id(last_status).publish_state(status);
                  // BL-013: surface the product info the scan response already carries.
                  id(last_product).publish_state(pname);
                  if (pprice >= 0.0f) { char pb[24]; snprintf(pb, sizeof(pb), "%.2f €", pprice); id(last_price).publish_state(pb); }
                  else { id(last_price).publish_state("—"); }
                  if (status == "added" || status == "duplicate_ignored") {
                    id(set_led)->execute(0, 180, 0);
                  } else if (status == "added_to_lists_only" || status == "partial") {
                    id(set_led)->execute(255, 185, 10);
                  } else {
                    id(set_led)->execute(200, 0, 0);
                  }
      - if:
          condition:
            lambda: 'return id(awaiting_response);'
          then:
            - lambda: |-
                id(awaiting_response) = false;
                ESP_LOGW("scan", "NO RESPONSE (unreachable) ean=%s", ean.c_str());
                id(last_ean).publish_state(ean);
                id(last_status).publish_state("unreachable");
            - script.execute:
                id: set_led
                r: 200
                g: 0
                b: 0
