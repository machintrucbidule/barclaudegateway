name: Release

# Versioned image build + push to GHCR, triggered ONLY by a vX.Y.Z git tag.
# Routine push/PR checks live in ci.yml (untouched). Cut a release by bumping the version and
# pushing a tag:  git tag v0.0.1 && git push origin v0.0.1
on:
  push:
    tags:
      - 'v*'

# GITHUB_TOKEN needs packages:write to push to the repo's GHCR namespace. No PAT required.
permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/machintrucbidule/barclaudegateway
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
