name: Docker build check

# Proves the Dockerfile builds on a Linux runner on every PR that touches it — WITHOUT publishing.
# No GHCR login, no secrets (fork-safe). The real publish happens only on a tag, in release.yml.
on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package*.json'
      - 'packages/**'

jobs:
  build:
    name: Build image (no push)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
